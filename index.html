<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CAMPETTO Flick and Score</title>
    <script>
        (function() {
            var lang = navigator.language || navigator.userLanguage;
            var langCode = lang.split('-')[0];
            var supported = ['it', 'de', 'es', 'fr', 'en'];
            
            if (supported.includes(langCode)) {
                window.location.href = '/' + langCode + '/';
            } else {
                window.location.href = '/en/';
            }
        })();
    </script>
</head>
<body>
    <p>Redirecting to your language... <a href="/en/">Click here if you are not redirected.</a></p>
</body>
</html>
